<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Неоплаченные счета — 1С</title>
<script src="/chart.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f172a; color:#e2e8f0; }
.header { background:linear-gradient(135deg,#1e293b,#334155); padding:20px 32px; border-bottom:1px solid #334155; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
.header h1 { font-size:20px; font-weight:600; }
.header p { color:#94a3b8; margin-top:4px; font-size:13px; }
.live { display:inline-block; background:#10b981; color:#fff; font-size:11px; padding:2px 8px; border-radius:10px; margin-left:8px; }
.back { color:#94a3b8; text-decoration:none; font-size:14px; padding:8px 16px; border:1px solid #334155; border-radius:8px; }
.org-tabs { display:flex; gap:8px; padding:12px 32px 0; }
.org-tab { padding:6px 18px; border-radius:8px 8px 0 0; cursor:pointer; font-size:13px; background:#1e293b; color:#94a3b8; border:1px solid #334155; border-bottom:none; }
.org-tab.active { background:#334155; color:#e2e8f0; font-weight:600; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:20px 32px; }
.card { background:#1e293b; border-radius:12px; padding:18px; border:1px solid #334155; }
.card-label { font-size:11px; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; }
.card-value { font-size:26px; font-weight:700; margin-top:6px; }
.card-sub { font-size:12px; color:#64748b; margin-top:4px; }
.red { color:#ef4444; } .amber { color:#f59e0b; } .green { color:#10b981; } .blue { color:#3b82f6; }
.charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:0 32px 20px; }
.chart-card { background:#1e293b; border-radius:12px; padding:18px; border:1px solid #334155; }
.chart-card h3 { font-size:13px; margin-bottom:12px; color:#94a3b8; }
.section { padding:0 32px 20px; }
.section-card { background:#1e293b; border-radius:12px; padding:18px; border:1px solid #334155; overflow-x:auto; }
.section-card h3 { font-size:13px; margin-bottom:12px; color:#94a3b8; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:8px 12px; border-bottom:1px solid #334155; color:#64748b; font-weight:500; white-space:nowrap; }
td { padding:8px 12px; border-bottom:1px solid rgba(51,65,85,0.5); }
tr:hover td { background:rgba(51,65,85,0.3); }
.num { text-align:right; font-variant-numeric:tabular-nums; }
.source { text-align:center; padding:12px; color:#475569; font-size:11px; }
.spinner { display:flex; align-items:center; justify-content:center; height:300px; color:#475569; font-size:14px; }
.err { color:#ef4444; padding:40px 32px; font-size:14px; }
.status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
@media(max-width:900px) { .grid { grid-template-columns:repeat(2,1fr); } .charts { grid-template-columns:1fr; } .header,.grid,.charts,.section,.org-tabs { padding-left:16px; padding-right:16px; } }
</style>
</head>
<body>
<script>if(!localStorage.getItem('accessToken'))window.location.href='/';</script>

<div class="header">
  <div>
    <h1>⚠️ Неоплаченные счета <span class="live" id="liveStatus">Загрузка...</span></h1>
    <p id="headerSub">Данные из 1С Бухгалтерия в реальном времени</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button onclick="loadData()" style="background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px">↻ Обновить</button>
    <a href="/budget" class="back">📊 Бюджет</a>
    <a href="/" class="back">← IndParkDocs</a>
  </div>
</div>

<div class="org-tabs">
  <div class="org-tab active" id="tabIPZ" onclick="switchOrg('ipz')">ИПЗ</div>
  <div class="org-tab" id="tabEKZ" onclick="switchOrg('ekz')">ЭКЗ</div>
</div>

<div id="content"><div class="spinner">Загружаю данные из 1С...</div></div>

<script>
const ORG_MAP = { ipz: 'ipz', ekz: 'ekz' };
let currentOrg = 'ipz';
let charts = [];

function fmt(n) {
  if (n == null) return '—';
  n = Math.round(n);
  if (n >= 1e6) return (n/1e6).toFixed(2).replace('.',',') + ' млн';
  if (n >= 1e3) return (n/1e3).toFixed(0) + ' тыс';
  return n.toLocaleString('ru-RU');
}
function fmtFull(n) {
  return Math.round(n || 0).toLocaleString('ru-RU');
}
function ageBadge(days) {
  if (days <= 30) return '<span style="background:#3b82f6;color:#fff;padding:2px 7px;border-radius:8px;font-size:11px">'+days+' дн.</span>';
  if (days <= 60) return '<span style="background:#f59e0b;color:#fff;padding:2px 7px;border-radius:8px;font-size:11px">'+days+' дн.</span>';
  if (days <= 90) return '<span style="background:#f97316;color:#fff;padding:2px 7px;border-radius:8px;font-size:11px">'+days+' дн.</span>';
  return '<span style="background:#ef4444;color:#fff;padding:2px 7px;border-radius:8px;font-size:11px">'+days+' дн. 🔥</span>';
}
function ageBar(days) {
  const pct = Math.min(days / 250 * 100, 100);
  const col = days > 90 ? '#ef4444' : days > 60 ? '#f97316' : days > 30 ? '#f59e0b' : '#3b82f6';
  return '<div style="width:'+pct+'%;height:6px;border-radius:3px;background:'+col+'"></div>';
}
function statusBadge(days) {
  if (days > 90) return '<span style="background:#ef4444;color:#fff;padding:2px 7px;border-radius:8px;font-size:11px">Хронический</span>';
  if (days > 30) return '<span style="background:#f59e0b;color:#fff;padding:2px 7px;border-radius:8px;font-size:11px">Задерживает</span>';
  return '<span style="background:#10b981;color:#fff;padding:2px 7px;border-radius:8px;font-size:11px">Свежий</span>';
}

function switchOrg(org) {
  currentOrg = org;
  document.getElementById('tabIPZ').className = 'org-tab' + (org==='ipz'?' active':'');
  document.getElementById('tabEKZ').className = 'org-tab' + (org==='ekz'?' active':'');
  loadData();
}

async function loadData() {
  const token = localStorage.getItem('accessToken');
  document.getElementById('liveStatus').textContent = 'Загрузка...';
  document.getElementById('liveStatus').style.background = '#475569';
  document.getElementById('content').innerHTML = '<div class="spinner">Загружаю данные из 1С...</div>';

  charts.forEach(c => { try { c.destroy(); } catch(e){} });
  charts = [];

  try {
    const orgParam = currentOrg === 'ekz' ? '6bf16c76-8993-11e8-b18d-001e67301201' : '1df6218d-8996-11e8-b18d-001e67301201';
    const resp = await fetch('/api/finance/overdue?org=' + orgParam, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (resp.status === 401) { window.location.href = '/'; return; }
    const d = await resp.json();
    if (d.error) throw new Error(d.error);

    const asOf = d.data_as_of ? new Date(d.data_as_of).toLocaleString('ru-RU') : '';
    document.getElementById('liveStatus').textContent = 'LIVE · ' + asOf;
    document.getElementById('liveStatus').style.background = '#10b981';
    document.getElementById('headerSub').textContent =
      (d.org_name || '') + ' · Просроченные счета покупателей · Обновлено ' + asOf;

    const t = d.totals || {};
    const aging = d.aging || {};
    const debtors = d.debtors || [];
    const maxDebt = debtors.length ? debtors[0].outstanding : 1;

    let h = '';

    // KPI cards
    h += '<div class="grid">';
    h += '<div class="card"><div class="card-label">Общий долг</div><div class="card-value red">'+fmt(t.outstanding)+'</div><div class="card-sub">'+t.debtor_count+' контрагентов-должников</div></div>';
    h += '<div class="card"><div class="card-label">Начислено (реализация)</div><div class="card-value blue">'+fmt(t.invoiced)+'</div><div class="card-sub">актов реализации с 2025</div></div>';
    h += '<div class="card"><div class="card-label">Оплачено (с 2025)</div><div class="card-value green">'+fmt(t.paid)+'</div><div class="card-sub">'+(t.invoiced > 0 ? Math.round(t.paid/t.invoiced*100) : 0)+'% от выставленного</div></div>';
    h += '<div class="card"><div class="card-label">Критичный долг (90+ дней)</div><div class="card-value red">'+fmt(aging.d90)+'</div><div class="card-sub">'+(t.outstanding > 0 ? Math.round(aging.d90/t.outstanding*100) : 0)+'% от общего долга</div></div>';
    h += '</div>';

    // Charts
    h += '<div class="charts">';
    h += '<div class="chart-card"><h3>💰 Долг по контрагентам (топ 8)</h3><canvas id="chartClients" height="200"></canvas></div>';
    h += '<div class="chart-card"><h3>📊 Старение долга (aging)</h3><canvas id="chartAging" height="200"></canvas></div>';
    h += '</div>';

    // Debtors summary table
    h += '<div class="section"><div class="section-card">';
    h += '<h3>🏢 Контрагенты-должники — сводка</h3>';
    h += '<table><thead><tr><th>Контрагент</th><th class="num">Долг, ₽</th><th class="num">Счетов</th><th class="num">Последний счёт</th><th class="num">Дней</th><th class="num">Начислено, ₽</th><th class="num">Оплачено, ₽</th><th>Статус</th></tr></thead><tbody>';
    for (const deb of debtors) {
      h += '<tr>';
      h += '<td><strong>'+deb.name+'</strong></td>';
      h += '<td class="num" style="color:#ef4444;font-weight:600">'+fmtFull(deb.outstanding)+'</td>';
      h += '<td class="num">'+deb.invoice_count+'</td>';
      h += '<td class="num">'+deb.last_invoice_date+'</td>';
      h += '<td class="num">'+ageBadge(deb.days_since_last)+'</td>';
      h += '<td class="num">'+fmtFull(deb.invoiced)+'</td>';
      h += '<td class="num">'+fmtFull(deb.paid)+'</td>';
      h += '<td>'+statusBadge(deb.days_since_last)+'</td>';
      h += '</tr>';
    }
    h += '</tbody></table></div></div>';

    // Top invoices per debtor
    h += '<div class="section"><div class="section-card">';
    h += '<h3>📋 Последние счета по должникам</h3>';
    h += '<table><thead><tr><th>Контрагент</th><th>Номер</th><th>Дата</th><th class="num">Сумма, ₽</th><th>Просрочка</th><th style="width:100px"></th></tr></thead><tbody>';
    for (const deb of debtors.slice(0, 12)) {
      for (const inv of deb.top_invoices.slice(0, 3)) {
        const days = Math.floor((new Date() - new Date(inv.date)) / 86400000);
        const icon = days > 90 ? '🔥' : days > 30 ? '⚠️' : '⏰';
        h += '<tr>';
        h += '<td>'+icon+' '+deb.name+'</td>';
        h += '<td style="color:#94a3b8">'+inv.num+'</td>';
        h += '<td>'+inv.date+'</td>';
        h += '<td class="num">'+fmtFull(inv.sum)+'</td>';
        h += '<td>'+ageBadge(days)+'</td>';
        h += '<td>'+ageBar(days)+'</td>';
        h += '</tr>';
      }
    }
    h += '</tbody></table></div></div>';

    h += '<div class="source">Данные: 1С Бухгалтерия · РеализацияТоваровУслуг (Дт62) − ОплатаПокупателя (Кт62) · Дебиторка = реализовано − оплачено по контрагенту</div>';

    document.getElementById('content').innerHTML = h;

    // Bar chart - debtors
    const top8 = debtors.slice(0, 8);
    charts.push(new Chart(document.getElementById('chartClients'), {
      type: 'bar',
      data: {
        labels: top8.map(d => d.name.length > 20 ? d.name.slice(0,18)+'…' : d.name),
        datasets: [{ label: 'Долг', data: top8.map(d => d.outstanding),
          backgroundColor: top8.map(d => d.days_since_last > 90 ? '#ef4444' : d.days_since_last > 30 ? '#f59e0b' : '#3b82f6'),
          borderRadius: 4 }]
      },
      options: { indexAxis: 'y', plugins: { legend: { display: false } },
        scales: { x: { ticks: { color: '#94a3b8', callback: v => v>=1e6?(v/1e6).toFixed(1)+'М':(v/1e3).toFixed(0)+'К' }, grid: { color: '#334155' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } } } }
    }));

    // Donut - aging
    charts.push(new Chart(document.getElementById('chartAging'), {
      type: 'doughnut',
      data: {
        labels: ['0–30 дней', '31–60 дней', '61–90 дней', '90+ дней'],
        datasets: [{ data: [aging.d0||0, aging.d30||0, aging.d60||0, aging.d90||0],
          backgroundColor: ['#3b82f6','#f59e0b','#f97316','#ef4444'], borderWidth: 0 }]
      },
      options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, color: '#94a3b8' } } } }
    }));

  } catch(e) {
    document.getElementById('liveStatus').textContent = 'Ошибка';
    document.getElementById('liveStatus').style.background = '#ef4444';
    document.getElementById('content').innerHTML = '<div class="err">⚠️ Ошибка загрузки: '+e.message+'<br><br><button onclick="loadData()" style="margin-top:12px;background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:8px;padding:8px 16px;cursor:pointer">Повторить</button></div>';
  }
}

loadData();
</script>
</body>
</html>
