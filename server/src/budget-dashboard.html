<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АО Индустриальный Парк Звезда — Бюджет 2026</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }

.header { background:linear-gradient(135deg,#1e293b,#334155); padding:16px 24px; border-bottom:1px solid #334155; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
.header h1 { font-size:18px; font-weight:600; }
.header p { color:#94a3b8; margin-top:3px; font-size:12px; }
.back { color:#94a3b8; text-decoration:none; font-size:13px; padding:7px 14px; border:1px solid #334155; border-radius:8px; }

.controls { display:flex; gap:10px; padding:14px 24px; background:#111827; border-bottom:1px solid #1e293b; flex-wrap:wrap; align-items:center; }
.ctrl-label { font-size:12px; color:#64748b; }
select, button { background:#1e293b; color:#e2e8f0; border:1px solid #334155; border-radius:7px; padding:6px 12px; font-size:13px; cursor:pointer; }
select:focus { outline:none; border-color:#3b82f6; }
button.primary { background:#2563eb; border-color:#2563eb; color:#fff; }
button.primary:hover { background:#1d4ed8; }
.badge-past { background:#1e3a5f; color:#60a5fa; padding:2px 7px; border-radius:5px; font-size:10px; font-weight:600; }
.badge-plan { background:#1a2e1a; color:#4ade80; padding:2px 7px; border-radius:5px; font-size:10px; font-weight:600; }
.badge-blended { background:#2e1a2e; color:#c084fc; padding:2px 7px; border-radius:5px; font-size:10px; font-weight:600; }

.legend { display:flex; gap:16px; align-items:center; margin-left:auto; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#94a3b8; }
.legend-dot { width:10px; height:10px; border-radius:2px; }
.dot-fact { background:#1e3a5f; border:1px solid #3b82f6; }
.dot-plan { background:#1a2e1a; border:1px solid #22c55e; }
.dot-blended { background:#2e1a2e; border:1px solid #a855f7; }

.kpi-row { display:flex; gap:12px; padding:14px 24px; flex-wrap:wrap; }
.kpi { background:#1e293b; border:1px solid #334155; border-radius:10px; padding:12px 18px; flex:1; min-width:160px; }
.kpi-label { font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; }
.kpi-value { font-size:22px; font-weight:700; margin-top:4px; }
.kpi-sub { font-size:11px; color:#64748b; margin-top:2px; }
.red { color:#ef4444; } .green { color:#10b981; } .blue { color:#60a5fa; } .amber { color:#f59e0b; } .purple { color:#c084fc; }

.main { padding:0 24px 24px; }
.table-wrap { overflow-x:auto; margin-top:14px; }
.budget-table { width:100%; border-collapse:collapse; font-size:12px; white-space:nowrap; }
.budget-table th { text-align:right; padding:7px 10px; background:#0f172a; color:#475569; font-weight:500; font-size:11px; border-bottom:2px solid #334155; position:sticky; top:0; z-index:2; }
.budget-table th:first-child { text-align:left; min-width:200px; max-width:340px; position:sticky; left:0; background:#0f172a; z-index:3; }
.budget-table td { padding:5px 10px; border-bottom:1px solid rgba(30,41,59,0.7); text-align:right; }
.budget-table td:first-child { text-align:left; white-space:normal; word-break:break-word; min-width:200px; max-width:340px; position:sticky; left:0; background:#0f172a; z-index:1; }
.budget-table tr:hover td { background:rgba(51,65,85,0.2); }
.budget-table tr:hover td:first-child { background:#0f172a; }

/* Row levels */
.lvl-0 td:first-child { font-weight:700; font-size:13px; color:#e2e8f0; }
.lvl-1 td:first-child { font-weight:600; color:#94a3b8; border-top:2px solid #334155; }
.lvl-2 td:first-child { font-weight:600; color:#94a3b8; padding-left:16px; }
.lvl-3 td:first-child { padding-left:28px; color:#cbd5e1; }
.lvl-4 td:first-child { padding-left:40px; color:#64748b; font-style:italic; }

/* Section separators */
.lvl-0 td { border-top:2px solid #334155; }
.lvl-1 td { border-top:1px solid #334155; }

/* Cell colors by type */
.cell-fact { color:#60a5fa; }
.cell-plan { color:#4ade80; }
.cell-blended { color:#c084fc; font-weight:500; }
.cell-dev-pos { color:#10b981; }
.cell-dev-neg { color:#ef4444; }
.cell-dev-neutral { color:#64748b; }
.cell-total-blended { color:#c084fc; font-weight:700; }
.cell-total-plan { color:#4ade80; font-weight:600; }
.cell-zero { color:#374151; }

.spinner { display:flex; align-items:center; justify-content:center; height:200px; color:#475569; }
.err { color:#ef4444; padding:24px; }

.sticky-col { }

.month-header-past { background:#0a1929; color:#3b82f6; }
.month-header-plan { background:#0a1a0a; color:#22c55e; }
.month-header-blended { background:#1a0a1a; }

.footer-note { text-align:center; padding:12px; color:#374151; font-size:11px; }

.expand-btn { cursor:pointer; color:#475569; font-size:10px; margin-right:4px; user-select:none; }

@media(max-width:768px) {
  .header, .controls, .kpi-row, .main { padding-left:12px; padding-right:12px; }
}
</style>
</head>
<body>
<script>if(!localStorage.getItem('accessToken'))window.location.href='/';</script>

<div class="header">
  <div>
    <h1>📊 АО «Индустриальный Парк Звезда» — Бюджет 2026</h1>
    <p id="headerSub">Blended прогноз: факт (прошлое) + план (будущее)</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <a href="/finance" class="back">↑ Задолженность</a>
    <a href="/" class="back">← IndParkDocs</a>
  </div>
</div>

<div class="controls">
  <div>
    <div class="ctrl-label">Тип бюджета</div>
    <select id="selType" onchange="onTypeChange()">
      <option value="БДР">БДР (Доходы/Расходы)</option>
      <option value="БДДС">БДДС (Денежные потоки)</option>
    </select>
  </div>
  <div>
    <div class="ctrl-label">Детализация</div>
    <select id="selLevel">
      <option value="1">Итого ЦФО</option>
      <option value="2" selected>Разделы</option>
      <option value="3">Категории</option>
      <option value="4">Листовые статьи</option>
    </select>
  </div>
  <button class="primary" onclick="loadBudget()">Показать</button>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-fact"></div>Факт (прошлое)</div>
    <div class="legend-item"><div class="legend-dot dot-plan"></div>План (будущее)</div>
    <div class="legend-item"><div class="legend-dot dot-blended"></div>Blended итого</div>
  </div>
</div>

<div id="kpiRow" class="kpi-row" style="display:none"></div>

<div class="main">
  <div id="content"><div class="spinner">Выберите параметры и нажмите «Показать»</div></div>
</div>

<script>
const TOKEN = localStorage.getItem('accessToken');

function num(v, forceSign=false) {
  if (v === null || v === undefined) return '<span class="cell-zero">—</span>';
  const n = Math.round(v);
  if (n === 0) return '<span class="cell-zero">0</span>';
  const s = Math.abs(n) >= 1000
    ? Math.abs(n).toLocaleString('ru-RU')
    : Math.abs(n).toString();
  const sign = n < 0 ? '−' : (forceSign ? '+' : '');
  return sign + s;
}

function numM(v) {
  if (v === null || v === undefined) return '—';
  const n = Math.round(v);
  if (n === 0) return '0';
  const abs = Math.abs(n);
  let s;
  if (abs >= 1e6) s = (abs/1e6).toFixed(1) + ' млн';
  else if (abs >= 1e3) s = (abs/1e3).toFixed(0) + ' тыс';
  else s = abs.toString();
  return (n < 0 ? '−' : '') + s;
}

const CFO = 'ИП'; // АО Индустриальный Парк Звезда

async function onTypeChange() {
  await loadBudget();
}

async function init() {
  try {
    await loadBudget();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="err">Ошибка загрузки: ' + e.message + '</div>';
  }
}

async function loadBudget() {
  const type = document.getElementById('selType').value;
  const cfo = CFO;
  const level = document.getElementById('selLevel').value;

  document.getElementById('content').innerHTML = '<div class="spinner">Загружаю...</div>';
  document.getElementById('kpiRow').style.display = 'none';

  try {
    const res = await fetch(`/api/finance/budget?type=${encodeURIComponent(type)}&cfo=${encodeURIComponent(cfo)}&level=${level}`, {
      headers: { Authorization: 'Bearer ' + TOKEN }
    });
    if (!res.ok) {
      const e = await res.json();
      document.getElementById('content').innerHTML = '<div class="err">Ошибка: ' + (e.error || res.status) + '</div>';
      return;
    }
    const d = await res.json();
    renderBudget(d);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="err">Ошибка: ' + e.message + '</div>';
  }
}

function renderBudget(d) {
  const { months, data, current_month, cfo, budget_type } = d;

  // Найдём строку уровня 0 (итого ЦФО) и уровня 1 (БДДС/БДР)
  const row0 = data.find(r => r.level === 0);
  const row1 = data.find(r => r.level === 1);
  const summary = row1 || row0;

  // KPI
  if (summary) {
    const kpiEl = document.getElementById('kpiRow');
    kpiEl.style.display = 'flex';
    const devSign = summary.deviation >= 0 ? '+' : '−';
    const devClass = summary.deviation >= 0 ? 'green' : 'red';
    const devPct = summary.deviation_pct != null ? ` (${summary.deviation_pct >= 0 ? '+' : ''}${summary.deviation_pct}%)` : '';
    kpiEl.innerHTML = `
      <div class="kpi">
        <div class="kpi-label">Факт (Янв–${months[current_month-1]?.name.slice(0,3) || '?'})</div>
        <div class="kpi-value blue">${numM(summary.blended.slice(0, current_month).reduce((a,b)=>a+b,0))}</div>
        <div class="kpi-sub">фактические данные</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Blended прогноз (год)</div>
        <div class="kpi-value purple">${numM(summary.blended_total)}</div>
        <div class="kpi-sub">факт + план (остаток года)</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Плановый итог (год)</div>
        <div class="kpi-value" style="color:#4ade80">${numM(summary.plan_total)}</div>
        <div class="kpi-sub">по бюджету 2026</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Отклонение от плана</div>
        <div class="kpi-value ${devClass}">${devSign}${numM(Math.abs(summary.deviation))}${devPct}</div>
        <div class="kpi-sub">${summary.deviation >= 0 ? '▲ лучше плана' : '▼ хуже плана'}</div>
      </div>
    `;
  }

  // Table
  const today = new Date();
  const curM = current_month;

  let html = '<div class="table-wrap"><table class="budget-table"><thead><tr>';
  html += `<th style="text-align:left">АО «ИПЗ» / ${budget_type}</th>`;

  for (let i = 0; i < 12; i++) {
    const m = months[i];
    const isPast = i < curM;
    const isCur = i === curM;
    const cls = isPast ? 'month-header-past' : (isCur ? 'month-header-blended' : 'month-header-plan');
    const badge = isPast ? '📊' : (isCur ? '⟳' : '📅');
    html += `<th class="${cls}" title="${isPast ? 'Факт' : 'План'}">${badge} ${m.name.slice(0,3)}</th>`;
  }
  html += `<th style="color:#c084fc">Blended</th>`;
  html += `<th style="color:#4ade80">План год</th>`;
  html += `<th>Откл.</th>`;
  html += `<th>%</th>`;
  html += '</tr></thead><tbody>';

  for (const row of data) {
    const lvl = row.level;
    // Skip level 0 in the table if there's a level 1 — it's redundant
    if (lvl === 0 && data.some(r => r.level === 1)) continue;

    const indent = `lvl-${lvl}`;
    html += `<tr class="${indent}">`;

    // Article name
    const name = row.article.replace(/^[-*]\s*/, '');
    html += `<td title="${row.article}">${name}</td>`;

    // Monthly values
    for (let i = 0; i < 12; i++) {
      const isPast = i < curM;
      // Show fact for past, plan for future
      const val = isPast ? row.fact[i] : row.plan[i];
      const cls = isPast ? 'cell-fact' : 'cell-plan';
      const n = val !== null ? Math.round(val) : null;
      if (n === null) {
        html += `<td><span class="cell-zero">—</span></td>`;
      } else if (n === 0) {
        html += `<td><span class="cell-zero">0</span></td>`;
      } else {
        const abs = Math.abs(n).toLocaleString('ru-RU');
        html += `<td class="${cls}">${n < 0 ? '−' : ''}${abs}</td>`;
      }
    }

    // Blended total
    const bt = row.blended_total;
    if (bt !== null) {
      const abs = Math.abs(bt).toLocaleString('ru-RU');
      html += `<td class="cell-total-blended">${bt < 0 ? '−' : ''}${abs}</td>`;
    } else {
      html += `<td>—</td>`;
    }

    // Plan total
    const pt = row.plan_total;
    if (pt !== null) {
      const abs = Math.abs(pt).toLocaleString('ru-RU');
      html += `<td class="cell-total-plan">${pt < 0 ? '−' : ''}${abs}</td>`;
    } else {
      html += `<td>—</td>`;
    }

    // Deviation
    const dev = row.deviation;
    if (dev !== null && dev !== undefined) {
      const devClass = dev > 1000 ? 'cell-dev-pos' : (dev < -1000 ? 'cell-dev-neg' : 'cell-dev-neutral');
      const sign = dev > 0 ? '+' : (dev < 0 ? '−' : '');
      const abs = Math.abs(dev).toLocaleString('ru-RU');
      html += `<td class="${devClass}">${sign}${abs}</td>`;
    } else {
      html += `<td>—</td>`;
    }

    // Deviation %
    if (row.deviation_pct !== null && row.deviation_pct !== undefined) {
      const pClass = row.deviation_pct > 0 ? 'cell-dev-pos' : (row.deviation_pct < 0 ? 'cell-dev-neg' : 'cell-dev-neutral');
      const sign = row.deviation_pct > 0 ? '+' : '';
      html += `<td class="${pClass}">${sign}${row.deviation_pct}%</td>`;
    } else {
      html += `<td>—</td>`;
    }

    html += '</tr>';
  }

  html += '</tbody></table></div>';

  const pastMonths = months.slice(0, curM).map(m => m.name.slice(0,3)).join(', ');
  const futureMonths = months.slice(curM).map(m => m.name.slice(0,3)).join(', ');
  html += `<div class="footer-note">
    📊 Факт (${pastMonths || '—'}) · 📅 Бюджет 2026 (${futureMonths || '—'}) · 
    Blended = факт до сегодня + план на остаток года
  </div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('headerSub').textContent =
    `${budget_type} · обновлено ${new Date().toLocaleString('ru-RU')}`;
}

init();
</script>
</body>
</html>
