name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: server
        run: npm ci
      - name: Run tests
        working-directory: server
        run: npm test -- --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret
          DATABASE_URL: postgresql://localhost/test

  deploy:
    runs-on: ubuntu-latest
    needs: test   # ← деплой только если тесты прошли
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/workspace-indparkdocs
            git pull origin main
            cd server && npm ci --production
            sudo systemctl restart indparkdocs
            sleep 2
            curl -sf http://localhost:3002/api/health || (echo "❌ Health check failed!" && exit 1)
            echo "✅ Deployed successfully"
